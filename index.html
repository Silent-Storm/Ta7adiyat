<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- إعدادات تطبيق الويب (PWA) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="جواهر">
    <meta name="description" content="تطبيق تفاعلي لتعليم اللغة العربية للأطفال عبر تحديات المطابقة، الإملاء، والترتيب باستخدام الرموز التعبيرية">
    <title>جواهر</title>
    
    <link rel="apple-touch-icon" href="https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/72x72/1f31f.png">
    <link rel="icon" href="https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/72x72/1f31f.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* إجبار الصفحة على عدم التمرير نهائياً والتثبيت المطلق */
        html, body { 
            position: fixed;
            width: 100%;
            height: 100dvh; 
            font-family: 'Cairo', sans-serif; 
            overflow: hidden; 
            overscroll-behavior: none; 
            touch-action: none; 
            background-color: #fce7f3; /* وردي طفولي */
            margin: 0; padding: 0;
            padding-top: env(safe-area-inset-top); 
            padding-bottom: env(safe-area-inset-bottom);
        }
        .no-select { user-select: none; -webkit-user-select: none; }
        .draggable { cursor: pointer; touch-action: none; position: relative; z-index: 20; }
        .draggable * { pointer-events: none; }
        #lines-canvas { pointer-events: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; }
        
        .shake { animation: shake 0.5s; }
        @keyframes shake {
          0%, 100% { transform: translateX(0); }
          20%, 60% { transform: translateX(-5px); }
          40%, 80% { transform: translateX(5px); }
        }
        .pop { animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .matched { transition: all 0.3s; opacity: 0.5; transform: scale(0.85); }
        
        /* توافق خطوط العرض مع مختلف الأجهزة */
        .dynamic-text { font-size: clamp(1rem, 4vw, 2.5rem); }
        .emoji-text { font-size: clamp(2rem, 8vw, 5rem); }
    </style>
</head>
<body class="text-purple-900 no-select flex flex-col">

    <!-- شاشة البداية (القائمة الرئيسية) -->
    <div id="menu-screen" class="flex-1 flex flex-col items-center justify-center p-4 z-20 pop h-full w-full">
        <div class="mb-4 text-center shrink-0 flex flex-col items-center">
            <div class="text-6xl drop-shadow-xl mb-1 animate-bounce">🌟</div>
            <h1 class="text-5xl font-black text-purple-700 drop-shadow-md tracking-wide">جواهر</h1>
        </div>
        
        <!-- شبكة الأزرار (6 تحديات) لتفادي التمرير -->
        <div class="w-full max-w-md grid grid-cols-2 gap-3 flex-1 overflow-hidden place-content-center px-2">
            <button onclick="startGame(1)" class="flex flex-col items-center justify-center bg-pink-500 hover:bg-pink-600 text-white font-bold py-4 rounded-3xl shadow-lg border-b-8 border-pink-700 active:border-b-0 active:translate-y-2 transition-all">
                <span class="text-3xl mb-1">✏️</span><span class="text-sm sm:text-lg text-center">مد الحرف</span>
            </button>
            <button onclick="startGame(2)" class="flex flex-col items-center justify-center bg-red-400 hover:bg-red-500 text-white font-bold py-4 rounded-3xl shadow-lg border-b-8 border-red-600 active:border-b-0 active:translate-y-2 transition-all">
                <span class="text-3xl mb-1">🎨</span><span class="text-sm sm:text-lg text-center">تحدي الألوان</span>
            </button>
            <button onclick="startGame(3)" class="flex flex-col items-center justify-center bg-yellow-400 hover:bg-yellow-500 text-purple-900 font-bold py-4 rounded-3xl shadow-lg border-b-8 border-yellow-600 active:border-b-0 active:translate-y-2 transition-all">
                <span class="text-3xl mb-1">🔢</span><span class="text-sm sm:text-lg text-center">مد الرقم</span>
            </button>
            <button onclick="startGame(4)" class="flex flex-col items-center justify-center bg-green-400 hover:bg-green-500 text-purple-900 font-bold py-4 rounded-3xl shadow-lg border-b-8 border-green-600 active:border-b-0 active:translate-y-2 transition-all">
                <span class="text-3xl mb-1">➕</span><span class="text-sm sm:text-lg text-center">تحدي الجمع</span>
            </button>
            <button onclick="startGame(5)" class="flex flex-col items-center justify-center bg-purple-500 hover:bg-purple-600 text-white font-bold py-4 rounded-3xl shadow-lg border-b-8 border-purple-700 active:border-b-0 active:translate-y-2 transition-all">
                <span class="text-3xl mb-1">🧩</span><span class="text-sm sm:text-lg text-center">الحرف الناقص</span>
            </button>
            <button onclick="startGame(6)" class="flex flex-col items-center justify-center bg-blue-400 hover:bg-blue-500 text-white font-bold py-4 rounded-3xl shadow-lg border-b-8 border-blue-600 active:border-b-0 active:translate-y-2 transition-all">
                <span class="text-3xl mb-1">🔠</span><span class="text-sm sm:text-lg text-center">ترتيب الحروف</span>
            </button>
        </div>
    </div>

    <!-- شاشة اللعب -->
    <div id="game-screen" class="hidden flex-1 flex flex-col h-full w-full">
        <!-- الشريط العلوي -->
        <div class="h-14 sm:h-16 bg-purple-600 text-white flex items-center justify-between px-3 shadow-md z-30 rounded-b-3xl shrink-0">
            <button onclick="showMenu()" class="text-xl sm:text-2xl bg-purple-800 w-10 h-10 rounded-full flex items-center justify-center shadow-inner active:scale-90 transition-transform">🔙</button>
            
            <div class="flex-1 flex justify-center items-center gap-1 px-1 text-center">
                <span class="text-yellow-300 text-lg sm:text-xl drop-shadow-md font-bold">⭐ <span id="stars-count">0</span></span>
            </div>

            <div class="text-center flex-1">
                <h2 id="header-title" class="text-xs sm:text-sm font-bold truncate">التحدي</h2>
                <p id="header-level" class="text-[10px] sm:text-xs text-yellow-300 font-bold tracking-wider">مرحلة 1</p>
            </div>

            <div id="lives-container" class="text-lg sm:text-xl flex space-x-1 rtl:space-x-reverse min-w-[60px] justify-end">❤️❤️❤️</div>
        </div>

        <!-- منطقة التحدي (بدون سكرول) -->
        <div id="game-area" class="flex-1 relative w-full overflow-hidden flex flex-col min-h-0">
            <canvas id="lines-canvas"></canvas>
            <div id="game-content" class="absolute inset-0 p-2 flex flex-col">
                <!-- محتوى اللعبة يولد هنا -->
            </div>
        </div>
    </div>

    <!-- نافذة منبثقة (إظهار الإجابة الصحيحة - شباك منفرد) -->
    <div id="answer-overlay" class="hidden fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-3xl p-6 w-full max-w-sm text-center shadow-2xl pop border-8 border-green-400 flex flex-col gap-4 max-h-[90vh] overflow-hidden">
            <h2 class="text-3xl font-black text-green-600">الإجابة الصحيحة! 💡</h2>
            <p class="text-gray-600 font-bold">تعلمي الصح يا بطلة قبل ما تعيدي المحاولة</p>
            
            <!-- محتوى الإجابة -->
            <div id="answer-details" class="flex-1 flex flex-col gap-2 overflow-y-auto my-2 text-2xl font-bold text-purple-800 bg-purple-50 p-4 rounded-xl border border-purple-200 justify-center">
                <!-- الإجابات تولد هنا -->
            </div>

            <button onclick="retryCurrentChallenge()" class="w-full bg-blue-500 hover:bg-blue-600 text-white text-xl font-bold py-3 rounded-2xl shadow-lg border-b-4 border-blue-700 active:border-b-0 active:translate-y-1 transition-all flex items-center justify-center gap-2">
                <span>إعادة المحاولة نفس التحدي</span> <span>🔄</span>
            </button>
        </div>
    </div>

    <!-- نافذة منبثقة (للفوز أو الخسارة النهائية) -->
    <div id="overlay" class="hidden fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-3xl p-6 sm:p-8 max-w-sm w-full text-center shadow-2xl pop border-8 border-yellow-400 flex flex-col gap-4">
            <h2 id="overlay-title" class="text-2xl sm:text-3xl font-black text-purple-700">عنوان</h2>
            <p id="overlay-msg" class="text-lg text-gray-700 font-bold">رسالة</p>
            <button id="overlay-save-btn" onclick="shareImage()" class="w-full bg-pink-500 text-white text-lg font-bold py-3 rounded-xl shadow active:translate-y-1 transition-all flex justify-center items-center gap-2">
                📸 احفظ الصورة (شهادة)
            </button>
            <button id="overlay-btn" class="w-full bg-purple-600 text-white text-xl font-bold py-3 rounded-xl shadow border-b-4 border-purple-800 active:border-b-0 active:translate-y-1 transition-all">
                موافق
            </button>
        </div>
    </div>

    <!-- كانفاس مخفي لرسم الشهادة -->
    <canvas id="cert-canvas" width="800" height="1000" style="display:none;"></canvas>

    <script>
        // قاموس الكلمات الشامل
        const fullDict = [
            {w:"بسة", e:"🐱"},{w:"كلب", e:"🐶"},{w:"عصفور", e:"🐦"},{w:"سمكة", e:"🐟"},
            {w:"أرنب", e:"🐰"},{w:"دب", e:"🐻"},{w:"حصان", e:"🐴"},{w:"دجاجة", e:"🐔"},
            {w:"فراشة", e:"🦋"},{w:"نحلة", e:"🐝"},{w:"شمس", e:"☀️"},{w:"قمر", e:"🌙"},
            {w:"نجمة", e:"⭐"},{w:"غيمة", e:"☁️"},{w:"مطر", e:"🌧️"},{w:"ثلج", e:"❄️"},
            {w:"نار", e:"🔥"},{w:"بحر", e:"🌊"},{w:"وردة", e:"🌹"},{w:"شجرة", e:"🌳"},
            {w:"تفاحة", e:"🍎"},{w:"موزة", e:"🍌"},{w:"برتقالة", e:"🍊"},{w:"عنب", e:"🍇"},
            {w:"بطيخة", e:"🍉"},{w:"تمر", e:"🌴"},{w:"خبز", e:"🍞"},{w:"حليب", e:"🥛"},
            {w:"كاسة", e:"🥤"},{w:"صحن", e:"🍽️"},{w:"ملعقة", e:"🥄"},{w:"شوكة", e:"🍴"},
            {w:"بيت", e:"🏠"},{w:"باب", e:"🚪"},{w:"شباك", e:"🪟"},{w:"سرير", e:"🛏️"},
            {w:"مخدة", e:"🛋️"},{w:"بطانية", e:"🛌"},{w:"كرسي", e:"🪑"},{w:"طاولة", e:"🪵"},
            {w:"مدرسة", e:"🏫"},{w:"كتاب", e:"📖"},{w:"قلم", e:"✏️"},{w:"دفتر", e:"📓"},
            {w:"شنطة", e:"🎒"},{w:"صورة", e:"🖼️"},{w:"ساعة", e:"⌚"},{w:"تلفون", e:"📱"},
            {w:"تلفزيون", e:"📺"},{w:"كاميرا", e:"📷"},{w:"سيارة", e:"🚗"},{w:"باص", e:"🚌"},
            {w:"طيارة", e:"✈️"},{w:"بسكليت", e:"🚲"},{w:"قطار", e:"🚂"},{w:"كورة", e:"⚽"},
            {w:"لعبة", e:"🧸"},{w:"دبدوب", e:"🧸"},{w:"فستان", e:"👗"},{w:"كندرة", e:"👞"},
            {w:"طاقية", e:"🧢"},{w:"جاكيت", e:"🧥"},{w:"بنطلون", e:"👖"},{w:"قميص", e:"👕"},
            {w:"جورب", e:"🧦"},{w:"فرشاية", e:"🪥"},{w:"مشط", e:"🪮"},{w:"صابونة", e:"🧼"},
            {w:"بشكير", e:"🧻"},{w:"مفتاح", e:"🔑"},{w:"هدية", e:"🎁"},{w:"بالون", e:"🎈"},
            {w:"كعكة", e:"🎂"},{w:"شمعة", e:"🕯️"},{w:"قلب", e:"❤️"},{w:"وجه", e:"🙂"},
            {w:"عين", e:"👁️"},{w:"إيد", e:"🖐️"},{w:"رجل", e:"🦶"},{w:"أصبع", e:"☝️"},
            {w:"ضحكة", e:"😄"},{w:"زعل", e:"😢"},{w:"نوم", e:"😴"},{w:"أكل", e:"🍲"},
            {w:"شرب", e:"🚰"},{w:"جري", e:"🏃"},{w:"قفز", e:"🦘"},{w:"غناء", e:"🎤"},
            {w:"رسم", e:"🎨"},{w:"إجاص", e:"🍐"},{w:"مانجا", e:"🥭"},{w:"أناناس", e:"🍍"},
            {w:"باربي", e:"👱‍♀️"},{w:"مكياج", e:"💄"},{w:"مرجيحة", e:"🛝"},{w:"حديقة", e:"🏞️"},
            {w:"رمل", e:"🏖️"},{w:"سمى", e:"🌌"},{w:"نجوم", e:"✨"},{w:"ضو", e:"💡"},
            {w:"عسل", e:"🍯"},{w:"جبنة", e:"🧀"},{w:"بيضة", e:"🥚"},{w:"خيار", e:"🥒"},
            {w:"ليمون", e:"🍋"},{w:"بريز", e:"🔌"},{w:"شاحن", e:"🔋"},{w:"محرمة", e:"🧻"},
            {w:"شنتة", e:"🎒"},{w:"ريشة", e:"🪶"},{w:"سطل", e:"🪣"},{w:"مجرفة", e:"⛏️"},
            {w:"راديو", e:"📻"},{w:"درج", e:"🪜"},{w:"سقف", e:"🏠"},{w:"حيط", e:"🧱"},
            {w:"مراية", e:"🪞"},{w:"حمامة", e:"🕊️"},{w:"غزال", e:"🦌"},{w:"فيل", e:"🐘"},
            {w:"زرافة", e:"🦒"},{w:"نملة", e:"🐜"},{w:"ذبابة", e:"🪰"},{w:"لولو", e:"🦪"},
            {w:"خرز", e:"📿"},{w:"عقد", e:"📿"}
        ];

        // قاموس الألوان للتحدي الثاني
        const colorsDict = [
            {w:"أحمر", e:"🔴"},{w:"أزرق", e:"🔵"},{w:"أخضر", e:"🟢"},{w:"أصفر", e:"🟡"},
            {w:"وردي", e:"🩷"},{w:"بنفسجي", e:"🟣"},{w:"برتقالي", e:"🟠"},{w:"أسود", e:"⚫"},
            {w:"أبيض", e:"⚪"},{w:"بني", e:"🟤"}
        ];

        let state = {
            challenge: 0,
            level: 1,
            stage: 1, 
            lives: 3,
            stars: parseInt(localStorage.getItem('jawaher_stars') || '0'),
            usedWords: [],
            matchesToWin: 0,
            currentMatches: 0,
            ttsUnlocked: false,
            chData: null 
        };

        document.getElementById('stars-count').innerText = state.stars;

        function addStar() {
            state.stars++;
            localStorage.setItem('jawaher_stars', state.stars);
            document.getElementById('stars-count').innerText = state.stars;
            let el = document.getElementById('stars-count');
            el.classList.add('pop');
            setTimeout(() => el.classList.remove('pop'), 400);
        }

        // تفعيل الصوت
        function initTTS() {
            if ('speechSynthesis' in window && !state.ttsUnlocked) {
                let msg = new SpeechSynthesisUtterance('');
                msg.volume = 0;
                window.speechSynthesis.speak(msg);
                state.ttsUnlocked = true;
            }
        }

        function speak(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                let msg = new SpeechSynthesisUtterance(text);
                msg.lang = 'ar-SA';
                msg.rate = 0.85; 
                let voices = window.speechSynthesis.getVoices();
                let arVoice = voices.find(v => v.lang.startsWith('ar'));
                if (arVoice) msg.voice = arVoice;
                window.speechSynthesis.speak(msg);
            }
        }

        // إعدادات الكانفاس (رسم الخطوط)
        let canvas = document.getElementById('lines-canvas');
        let ctx = canvas.getContext('2d');
        let matchedPairs = []; 
        let isDrawing = false;
        let startNode = null;
        let currentTouch = {x: 0, y: 0};

        function resizeCanvas() {
            let area = document.getElementById('game-area');
            canvas.width = area.clientWidth;
            canvas.height = area.clientHeight;
        }
        window.addEventListener('resize', resizeCanvas);

        function drawLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.lineCap = "round";
            let rect = document.getElementById('game-area').getBoundingClientRect();

            ctx.lineWidth = 6;
            matchedPairs.forEach(pair => {
                let r1 = pair.el1.getBoundingClientRect();
                let r2 = pair.el2.getBoundingClientRect();
                ctx.strokeStyle = "#a855f7"; 
                ctx.beginPath();
                ctx.moveTo(r1.left + r1.width/2 - rect.left, r1.top + r1.height/2 - rect.top);
                ctx.lineTo(r2.left + r2.width/2 - rect.left, r2.top + r2.height/2 - rect.top);
                ctx.stroke();
            });

            if (isDrawing && startNode) {
                let r1 = startNode.getBoundingClientRect();
                ctx.strokeStyle = "#f472b6"; 
                ctx.beginPath();
                ctx.moveTo(r1.left + r1.width/2 - rect.left, r1.top + r1.height/2 - rect.top);
                ctx.lineTo(currentTouch.x - rect.left, currentTouch.y - rect.top);
                ctx.stroke();
            }
            requestAnimationFrame(drawLoop);
        }
        drawLoop(); 

        function showMenu() {
            document.getElementById('menu-screen').classList.remove('hidden');
            document.getElementById('game-screen').classList.add('hidden');
        }

        function startGame(ch) {
            initTTS();
            speak('يلا نلعب يا جواهر'); 
            state.challenge = ch;
            state.level = 1;
            state.stage = 1;
            state.lives = 3;
            state.usedWords = [];
            
            document.getElementById('menu-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            setTimeout(() => {
                resizeCanvas();
                generateAndRenderChallenge();
            }, 50);
        }

        function updateHeader() {
            let lvlTxt = `مستوى ${state.level}`;
            if(state.challenge === 4 || state.challenge === 5 || state.challenge === 6) lvlTxt = `مرحلة ${state.stage}`;
            document.getElementById('header-level').innerText = lvlTxt;
            
            const titles = ["", "مد الحرف", "اختيار اللون", "مد الرقم", "تحدي الجمع", "الحرف الناقص", "ترتيب الحروف"];
            document.getElementById('header-title').innerText = titles[state.challenge];
            updateLivesDisplay();
        }

        function updateLivesDisplay() {
            let hearts = '';
            for(let i=0; i<3; i++) hearts += i < state.lives ? '❤️' : '🖤';
            document.getElementById('lives-container').innerText = hearts;
        }

        // يفصل بين توليد البيانات (Generate) وبين الرسم (Render) عشان الإعادة
        function generateAndRenderChallenge() {
            matchedPairs = []; 
            document.getElementById('game-content').innerHTML = '';
            updateHeader();

            if (state.challenge === 1) genCh1();
            else if (state.challenge === 2) genCh2();
            else if (state.challenge === 3) genCh3();
            else if (state.challenge === 4) genCh4();
            else if (state.challenge === 5) genCh5();
            else if (state.challenge === 6) genCh6();
        }

        // دالة إعادة المحاولة لنفس التحدي
        function retryCurrentChallenge() {
            document.getElementById('answer-overlay').classList.add('hidden');
            state.lives = 3;
            matchedPairs = [];
            document.getElementById('game-content').innerHTML = '';
            updateHeader();
            
            if (state.challenge === 1) renderCh1UI();
            else if (state.challenge === 2) renderCh2UI();
            else if (state.challenge === 3) renderCh3UI();
            else if (state.challenge === 4) renderCh4UI();
            else if (state.challenge === 5) renderCh5UI();
            else if (state.challenge === 6) renderCh6UI();
        }

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        // ============================================
        // نظام الخطأ والإجابة الصحيحة
        // ============================================
        function handleWrong() {
            speak('حاولي مرة ثانية يا بطلة');
            state.lives--;
            updateLivesDisplay();
            let area = document.getElementById('game-area');
            area.classList.add('shake');
            setTimeout(() => area.classList.remove('shake'), 500);

            if(state.lives <= 0) {
                showAnswerOverlay();
            }
        }

        function showAnswerOverlay() {
            speak('شوفي الإجابة الصح عشان نتعلم');
            let detailsHtml = '';

            if (state.challenge === 1) {
                detailsHtml = state.chData.selected.map(s => `<div class="flex items-center justify-center gap-4 border-b border-purple-200 pb-2"><span>${s.w.charAt(0)}</span> <span class="text-sm">➡️</span> <span class="text-3xl">${s.e}</span></div>`).join('');
            } 
            else if (state.challenge === 2) {
                detailsHtml = state.chData.selected.map(s => `<div class="flex items-center justify-center gap-4 border-b border-purple-200 pb-2"><span>${s.w}</span> <span class="text-sm">➡️</span> <span class="text-3xl">${s.e}</span></div>`).join('');
            }
            else if (state.challenge === 3) {
                detailsHtml = state.chData.selected.map(s => `<div class="flex items-center justify-center gap-4 border-b border-purple-200 pb-2"><span>${s.num}</span> <span class="text-sm">➡️</span> <span class="text-xl flex flex-wrap max-w-[150px] justify-center">${s.emojiHtml}</span></div>`).join('');
            }
            else if (state.challenge === 4) {
                detailsHtml = `<div class="text-4xl font-black text-pink-500">${state.chData.a} + ${state.chData.b} = ${state.chData.ans}</div>`;
            }
            else if (state.challenge === 5 || state.challenge === 6) {
                detailsHtml = `<div class="text-6xl mb-2">${state.chData.emoji}</div><div class="text-5xl font-black text-pink-500">${state.chData.word}</div>`;
            }

            document.getElementById('answer-details').innerHTML = detailsHtml;
            document.getElementById('answer-overlay').classList.remove('hidden');
        }

        // ============================================
        // نظام الفوز والشهادة
        // ============================================
        function winLevel() {
            addStar();
            speak('ممتاز يا شطورة');
            
            if(state.challenge === 1 || state.challenge === 2 || state.challenge === 3) {
                if(state.level >= 5) {
                    showFinalWin(`يا عيني على الشطارة! خلصتي التحدي وجمعتي ${state.stars} نجمة!`);
                } else {
                    state.level++;
                    generateAndRenderChallenge();
                }
            } 
            else if (state.challenge === 4) {
                if(state.stage >= 10) {
                    if(state.level >= 3) showFinalWin('أنهيتي كل تحديات الجمع!');
                    else { state.level++; state.stage = 1; generateAndRenderChallenge(); }
                } else {
                    state.stage++;
                    generateAndRenderChallenge();
                }
            }
            else { // 5 و 6
                if(state.stage >= 16) showFinalWin('ختمتي التحدي بامتياز يا بطلة!');
                else { state.stage++; generateAndRenderChallenge(); }
            }
        }

        function showFinalWin(msg) {
            let overlay = document.getElementById('overlay');
            document.getElementById('overlay-title').innerText = "شهادة فوز بطلة! 🎉";
            document.getElementById('overlay-msg').innerText = msg;
            state.overlayData = { title: "شهادة فوز بطلة!", msg: msg };
            
            let btn = document.getElementById('overlay-btn');
            btn.onclick = () => { overlay.classList.add('hidden'); showMenu(); };
            overlay.classList.remove('hidden');
        }

        async function shareImage() {
            const cvs = document.getElementById('cert-canvas');
            const c = cvs.getContext('2d');
            
            c.fillStyle = '#fce7f3'; 
            c.fillRect(0, 0, 800, 1000);
            
            c.strokeStyle = '#ec4899';
            c.lineWidth = 25;
            c.strokeRect(25, 25, 750, 950);
            
            c.strokeStyle = '#fff';
            c.lineWidth = 10;
            c.strokeRect(50, 50, 700, 900);

            c.textAlign = 'center';
            c.fillStyle = '#7e22ce'; 
            c.font = 'bold 70px Cairo, sans-serif';
            c.fillText('🌟 تطبيق جواهر 🌟', 400, 160);

            c.font = 'bold 90px Cairo, sans-serif';
            c.fillStyle = '#db2777';
            c.fillText(state.overlayData.title, 400, 380);

            c.font = 'bold 50px Cairo, sans-serif';
            c.fillStyle = '#374151';
            
            let words = state.overlayData.msg.split(' ');
            let line = '';
            let y = 520;
            for(let i = 0; i < words.length; i++) {
                let testLine = line + words[i] + ' ';
                if(c.measureText(testLine).width > 600 && i > 0) {
                    c.fillText(line, 400, y);
                    line = words[i] + ' ';
                    y += 70;
                } else {
                    line = testLine;
                }
            }
            c.fillText(line, 400, y);

            c.font = 'bold 60px Cairo, sans-serif';
            c.fillStyle = '#eab308';
            c.fillText('إجمالي النجوم: ⭐ ' + state.stars, 400, y + 120);

            c.font = '60px Arial';
            c.fillText('👱‍♀️ 🍍 💄 🥭 👗', 400, 900);

            try {
                const dataUrl = cvs.toDataURL('image/png');
                const blob = await (await fetch(dataUrl)).blob();
                const file = new File([blob], 'jawaher_certificate.png', { type: blob.type });
                
                if (navigator.canShare && navigator.canShare({ files: [file] })) {
                    await navigator.share({ files: [file], title: 'شهادة جواهر', text: 'شهادة بطلة!' });
                } else {
                    const link = document.createElement('a');
                    link.download = 'jawaher_certificate.png';
                    link.href = dataUrl;
                    link.click();
                }
            } catch (err) { console.log(err); }
        }

        // ============================================
        // نظام السحب للتحديات (1, 2, 3)
        // ============================================
        function bindDragEvents() {
            const draggables = document.querySelectorAll('.draggable');
            draggables.forEach(el => {
                el.addEventListener('touchstart', onPointerDown, {passive: false});
                el.addEventListener('mousedown', onPointerDown, {passive: false});
            });
        }
        function onPointerDown(e) {
            e.preventDefault();
            if(e.target.classList.contains('matched')) return;

            startNode = e.target.closest('.draggable');
            if (startNode) {
                let val = startNode.dataset.val;
                if(val) speak(val);
            }
            isDrawing = true;
            let clientX = e.touches ? e.touches[0].clientX : e.clientX;
            let clientY = e.touches ? e.touches[0].clientY : e.clientY;
            currentTouch = {x: clientX, y: clientY};
        }
        window.addEventListener('touchmove', (e) => {
            if (!isDrawing) return;
            e.preventDefault();
            currentTouch = {x: e.touches[0].clientX, y: e.touches[0].clientY};
        }, {passive: false});
        window.addEventListener('mousemove', (e) => {
            if (!isDrawing) return;
            currentTouch = {x: e.clientX, y: e.clientY};
        });
        window.addEventListener('touchend', (e) => {
            if (!isDrawing) return;
            handlePointerUp(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
        });
        window.addEventListener('mouseup', (e) => {
            if (!isDrawing) return;
            handlePointerUp(e.clientX, e.clientY);
        });
        function handlePointerUp(x, y) {
            isDrawing = false;
            canvas.style.display = 'none';
            let endNodeRaw = document.elementFromPoint(x, y);
            canvas.style.display = 'block';

            if (!endNodeRaw) { startNode = null; return; }
            let endNode = endNodeRaw.closest('.draggable');

            if (endNode && endNode !== startNode && !endNode.classList.contains('matched')) {
                if(startNode.dataset.type !== endNode.dataset.type && startNode.dataset.id === endNode.dataset.id) {
                    speak('شاطرة');
                    matchedPairs.push({el1: startNode, el2: endNode});
                    startNode.classList.add('matched', 'bg-green-200');
                    endNode.classList.add('matched', 'bg-green-200');
                    state.currentMatches++;
                    if(state.currentMatches === state.matchesToWin) setTimeout(winLevel, 500);
                } else {
                    handleWrong();
                }
            }
            startNode = null;
        }

        // ============================================
        // التحدي 1: مد الحرف للصورة
        // ============================================
        function genCh1() {
            let available = fullDict.filter(d => !state.usedWords.includes(d.w));
            shuffle(available);
            let selected = [];
            let usedLetters = new Set();
            for (let item of available) {
                let firstLetter = item.w.charAt(0);
                if (!usedLetters.has(firstLetter)) {
                    selected.push(item);
                    usedLetters.add(firstLetter);
                    if (selected.length === 5) break;
                }
            }
            if(selected.length < 5) { state.usedWords = []; return genCh1(); }
            selected.forEach(w => state.usedWords.push(w.w));

            let left = selected.map(item => ({ id: item.w, content: item.w.charAt(0), val: item.w.charAt(0) }));
            let right = selected.map(item => ({ id: item.w, content: item.e, val: item.w }));
            shuffle(left); shuffle(right);
            
            state.chData = { selected, left, right };
            renderCh1UI();
        }
        function renderCh1UI() {
            let html = `
            <div class="flex justify-between items-center w-full h-full flex-1 z-20 pop px-2 pb-2">
                <div class="flex flex-col justify-evenly h-full w-[30%]">
                    ${state.chData.left.map(l => `<div class="draggable bg-yellow-400 rounded-2xl w-full aspect-square max-h-[14vh] max-w-[70px] flex items-center justify-center text-3xl font-bold shadow-lg border-4 border-white text-purple-900 mx-auto" data-type="A" data-id="${l.id}" data-val="${l.val}">${l.content}</div>`).join('')}
                </div>
                <div class="flex flex-col justify-evenly h-full w-[35%] items-end">
                    ${state.chData.right.map(r => `<div class="draggable bg-white rounded-3xl w-full aspect-square max-h-[15vh] max-w-[80px] flex items-center justify-center text-4xl shadow-lg border-4 border-pink-400 mx-auto" data-type="B" data-id="${r.id}" data-val="${r.val}">${r.content}</div>`).join('')}
                </div>
            </div>`;
            document.getElementById('game-content').innerHTML = html;
            state.matchesToWin = 5; state.currentMatches = 0;
            bindDragEvents();
        }

        // ============================================
        // التحدي 2: مد اللون
        // ============================================
        function genCh2() {
            let available = colorsDict.filter(d => !state.usedWords.includes(d.w));
            if(available.length < 5) { state.usedWords = []; available = [...colorsDict]; }
            shuffle(available);
            let selected = available.slice(0, 5);
            selected.forEach(w => state.usedWords.push(w.w));

            let left = selected.map(item => ({ id: item.w, content: item.w, val: item.w }));
            let right = selected.map(item => ({ id: item.w, content: item.e, val: item.w }));
            shuffle(left); shuffle(right);
            
            state.chData = { selected, left, right };
            renderCh2UI();
        }
        function renderCh2UI() {
            let html = `
            <div class="flex justify-between items-center w-full h-full flex-1 z-20 pop px-2 pb-2">
                <div class="flex flex-col justify-evenly h-full w-[45%]">
                    ${state.chData.left.map(l => `<div class="draggable bg-blue-100 rounded-2xl w-full py-3 flex items-center justify-center text-xl sm:text-2xl font-bold shadow-lg border-4 border-white text-purple-900 mx-auto" data-type="A" data-id="${l.id}" data-val="${l.val}">${l.content}</div>`).join('')}
                </div>
                <div class="flex flex-col justify-evenly h-full w-[30%] items-end">
                    ${state.chData.right.map(r => `<div class="draggable bg-white rounded-full w-full aspect-square max-h-[12vh] max-w-[70px] flex items-center justify-center text-4xl shadow-lg border-4 border-gray-200 mx-auto" data-type="B" data-id="${r.id}" data-val="${r.val}">${r.content}</div>`).join('')}
                </div>
            </div>`;
            document.getElementById('game-content').innerHTML = html;
            state.matchesToWin = 5; state.currentMatches = 0;
            bindDragEvents();
        }

        // ============================================
        // التحدي 3: مد الرقم
        // ============================================
        function genCh3() {
            let numbers = [];
            while(numbers.length < 5) {
                let r = Math.floor(Math.random() * 8) + 1; 
                if(!numbers.includes(r)) numbers.push(r);
            }
            let selected = numbers.map(n => {
                let rEmoji = fullDict[Math.floor(Math.random() * fullDict.length)].e;
                let emojiHtml = Array(n).fill(`<span>${rEmoji}</span>`).join('');
                return { num: n, emojiHtml };
            });

            let left = selected.map(item => ({ id: item.num, content: item.num, val: item.num }));
            let right = selected.map(item => ({ id: item.num, content: `<div class="flex flex-wrap justify-center items-center gap-0.5">${item.emojiHtml}</div>`, val: item.num }));
            shuffle(left); shuffle(right);
            
            state.chData = { selected, left, right };
            renderCh3UI();
        }
        function renderCh3UI() {
            let html = `
            <div class="flex justify-between items-center w-full h-full flex-1 z-20 pop px-2 pb-2">
                <div class="flex flex-col justify-evenly h-full w-[25%]">
                    ${state.chData.left.map(l => `<div class="draggable bg-pink-400 rounded-full w-full aspect-square max-h-[12vh] max-w-[65px] flex items-center justify-center text-2xl font-bold shadow-lg border-4 border-white text-white mx-auto" data-type="A" data-id="${l.id}" data-val="${l.val}">${l.content}</div>`).join('')}
                </div>
                <div class="flex flex-col justify-evenly h-full w-[60%]">
                    ${state.chData.right.map(r => `<div class="draggable bg-white rounded-2xl w-full p-2 min-h-[10vh] flex items-center justify-center shadow-lg border-4 border-yellow-400 mx-auto text-xl sm:text-2xl" data-type="B" data-id="${r.id}" data-val="${r.val}">${r.content}</div>`).join('')}
                </div>
            </div>`;
            document.getElementById('game-content').innerHTML = html;
            state.matchesToWin = 5; state.currentMatches = 0;
            bindDragEvents();
        }

        // ============================================
        // التحدي 4: تحدي الجمع
        // ============================================
        function genCh4() {
            let maxTotal = state.level === 1 ? 6 : (state.level === 2 ? 8 : 10);
            let a = Math.floor(Math.random() * (maxTotal - 1)) + 1;
            let b = Math.floor(Math.random() * (maxTotal - a)) + 1;
            let ans = a + b;
            
            let e1 = fullDict[Math.floor(Math.random() * fullDict.length)].e;
            let e2 = fullDict[Math.floor(Math.random() * fullDict.length)].e;

            let options = [ans];
            while(options.length < 3) {
                let r = Math.floor(Math.random() * maxTotal) + 1;
                if(!options.includes(r)) options.push(r);
            }
            shuffle(options);

            state.chData = { a, b, ans, e1, e2, options };
            renderCh4UI();
        }
        function renderCh4UI() {
            let str1 = Array(state.chData.a).fill(state.chData.e1).join('');
            let str2 = Array(state.chData.b).fill(state.chData.e2).join('');
            let html = `
            <div class="flex flex-col items-center justify-evenly h-full flex-1 w-full text-center pop px-2">
                <div class="flex flex-col items-center gap-2 bg-white p-4 rounded-3xl shadow-md border-4 border-purple-200 w-full max-w-sm">
                    <div class="text-3xl sm:text-4xl flex flex-wrap justify-center cursor-pointer" onclick="speak('${state.chData.a}')">${str1}</div>
                    <div class="text-4xl font-black text-purple-600">➕</div>
                    <div class="text-3xl sm:text-4xl flex flex-wrap justify-center cursor-pointer" onclick="speak('${state.chData.b}')">${str2}</div>
                </div>
                <div class="text-4xl font-black text-pink-500">= ؟</div>
                <div class="flex gap-4 w-full justify-center">
                    ${state.chData.options.map(opt => `
                        <button class="ans-btn bg-yellow-400 hover:bg-yellow-500 text-purple-900 text-3xl font-bold w-20 h-20 rounded-2xl shadow-md border-b-8 border-yellow-600 active:border-b-0 active:translate-y-2 transition-all" data-correct="${opt === state.chData.ans}" onclick="checkCh4Ans(this, ${opt === state.chData.ans}, ${opt})">
                            ${opt}
                        </button>
                    `).join('')}
                </div>
            </div>`;
            document.getElementById('game-content').innerHTML = html;
        }
        function checkCh4Ans(btn, isCorrect, val) {
            speak(val);
            if(isCorrect) { btn.classList.replace('bg-yellow-400', 'bg-green-400'); setTimeout(winLevel, 400); }
            else handleWrong();
        }

        // ============================================
        // التحدي 5: الحرف الناقص
        // ============================================
        function genCh5() {
            let available = fullDict.filter(d => !state.usedWords.includes(d.w) && d.w.length >= 3);
            if(available.length === 0) { state.usedWords = []; available = fullDict.filter(d => d.w.length >= 3); }
            let item = available[Math.floor(Math.random() * available.length)];
            state.usedWords.push(item.w);

            let hideIdx = Math.floor(Math.random() * item.w.length);
            let hiddenLetter = item.w[hideIdx];
            let displayWord = item.w.split('');
            displayWord[hideIdx] = 'ـ_ـ';

            let allLetters = "ابتثجحخدذرزسشصضطظعغفقكلمنهوي";
            let options = [hiddenLetter];
            while(options.length < 4) {
                let r = allLetters[Math.floor(Math.random() * allLetters.length)];
                if(!options.includes(r)) options.push(r);
            }
            shuffle(options);
            state.chData = { word: item.w, emoji: item.e, hiddenLetter, displayWord, options };
            renderCh5UI();
        }
        function renderCh5UI() {
            let html = `
            <div class="flex flex-col items-center justify-evenly h-full flex-1 w-full text-center pop px-4">
                <div class="text-6xl sm:text-8xl drop-shadow-xl animate-bounce cursor-pointer" onclick="speak('${state.chData.word}')">${state.chData.emoji}</div>
                <div class="text-3xl sm:text-4xl font-black tracking-widest text-white bg-purple-600 px-6 py-4 rounded-3xl shadow-xl border-4 border-yellow-400 w-full max-w-sm">
                    ${state.chData.displayWord.join('')}
                </div>
                <div class="grid grid-cols-2 gap-4 w-full max-w-xs">
                    ${state.chData.options.map(opt => `
                        <button class="ans-btn bg-yellow-400 hover:bg-yellow-500 text-purple-900 text-3xl font-bold py-4 rounded-2xl shadow-md border-b-8 border-yellow-600 active:border-b-0 active:translate-y-2 transition-all" data-correct="${opt === state.chData.hiddenLetter}" onclick="checkCh5Ans(this, ${opt === state.chData.hiddenLetter}, '${opt}')">
                            ${opt}
                        </button>
                    `).join('')}
                </div>
            </div>`;
            document.getElementById('game-content').innerHTML = html;
        }
        function checkCh5Ans(btn, isCorrect, letter) {
            speak(letter);
            if(isCorrect) { btn.classList.replace('bg-yellow-400', 'bg-green-400'); setTimeout(winLevel, 400); }
            else handleWrong();
        }

        // ============================================
        // التحدي 6: ترتيب الحروف
        // ============================================
        function genCh6() {
            let available = fullDict.filter(d => !state.usedWords.includes(d.w) && d.w.length >= 3 && d.w.length <= 5);
            if(available.length === 0) { state.usedWords = []; available = fullDict.filter(d => d.w.length >= 3 && d.w.length <= 5); }
            let item = available[Math.floor(Math.random() * available.length)];
            state.usedWords.push(item.w);

            let letters = item.w.split('');
            let scrambled = [...letters];
            shuffle(scrambled);

            state.chData = {
                word: item.w, emoji: item.e, letters: letters,
                scrambled: scrambled.map((char, id) => ({char, id, used: false})),
                selected: []
            };
            renderCh6UI();
        }
        function renderCh6UI() {
            let html = `
            <div class="flex flex-col items-center justify-evenly h-full flex-1 w-full text-center pop px-2">
                <div class="text-6xl sm:text-8xl drop-shadow-xl animate-bounce cursor-pointer" onclick="speak('${state.chData.word}')">${state.chData.emoji}</div>
                <div class="flex space-x-1 rtl:space-x-reverse justify-center w-full">
                    ${state.chData.letters.map((_, i) => {
                        let s = state.chData.selected[i];
                        return `<div class="ch5-slot w-14 h-14 bg-purple-200 border-4 border-purple-500 rounded-xl flex items-center justify-center text-3xl font-bold text-purple-900 cursor-pointer" onclick="undoCh6Letter(${i})">
                            ${s ? s.char : ''}
                        </div>`;
                    }).join('')}
                </div>
                <div class="flex flex-wrap justify-center gap-2 w-full">
                    ${state.chData.scrambled.map(obj => {
                        if(obj.used) return `<div class="w-14 h-14 opacity-0"></div>`;
                        return `<button class="bg-yellow-400 text-purple-900 text-3xl font-bold w-14 h-14 rounded-xl shadow-md border-b-8 border-yellow-600 active:translate-y-2 transition-all" onclick="selectCh6Letter(${obj.id}, '${obj.char}')">
                            ${obj.char}
                        </button>`;
                    }).join('')}
                </div>
            </div>`;
            document.getElementById('game-content').innerHTML = html;
        }
        function selectCh6Letter(id, char) {
            speak(char);
            let obj = state.chData.scrambled.find(o => o.id === id);
            obj.used = true;
            state.chData.selected.push({id, char});
            renderCh6UI();

            if(state.chData.selected.length === state.chData.letters.length) {
                let formedWord = state.chData.selected.map(s => s.char).join('');
                if(formedWord === state.chData.word) setTimeout(winLevel, 400);
                else {
                    handleWrong();
                    if(state.lives > 0) { 
                        state.chData.selected = []; state.chData.scrambled.forEach(o => o.used = false);
                        setTimeout(renderCh6UI, 600);
                    }
                }
            }
        }
        function undoCh6Letter(index) {
            if(!state.chData.selected[index]) return;
            let sel = state.chData.selected[index];
            state.chData.selected.splice(index, 1);
            state.chData.scrambled.find(o => o.id === sel.id).used = false;
            speak('رجوع'); renderCh6UI();
        }
    </script>
