    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* التثبيت المطلق للشاشة ومنع التمرير نهائياً */
        html, body { 
            position: fixed; width: 100%; height: 100dvh; 
            font-family: 'Cairo', sans-serif; 
            overflow: hidden; overscroll-behavior: none; touch-action: none; 
            background-color: #fce7f3; /* وردي طفولي */
            margin: 0; padding: 0;
            padding-top: env(safe-area-inset-top); 
            padding-bottom: env(safe-area-inset-bottom);
        }
        .no-select { user-select: none; -webkit-user-select: none; }
        .draggable { cursor: pointer; touch-action: none; position: relative; z-index: 20; }
        .draggable * { pointer-events: none; }
        
        #lines-canvas { pointer-events: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; }
        #maze-canvas { touch-action: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 15; }
        
        /* حركات التفاعل الأساسية فقط */
        .shake { animation: shake 0.5s; }
        @keyframes shake {
          0%, 100% { transform: translateX(0); }
          20%, 60% { transform: translateX(-5px); }
          40%, 80% { transform: translateX(5px); }
        }
        .pop { animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .matched { transition: all 0.3s; opacity: 0.5; transform: scale(0.85); pointer-events: none; }
        
        /* لعبة الذاكرة 3D Flip */
        .perspective-1000 { perspective: 1000px; }
        .transform-style-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; -webkit-backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
    </style>
</head>
<body class="text-purple-900 no-select flex flex-col">

    <!-- شاشة البداية (القائمة الرئيسية) -->
    <div id="menu-screen" class="flex-1 flex flex-col items-center justify-start pt-4 sm:pt-8 p-2 z-20 pop h-full w-full overflow-hidden">

        <!-- شبكة الأزرار (8 تحديات) -->
        <div class="w-full max-w-md grid grid-cols-2 gap-2 sm:gap-3 flex-1 pb-4 place-content-center px-2">
            <button onclick="startGame(1)" class="flex flex-col items-center justify-center bg-pink-500 hover:bg-pink-600 text-white font-bold py-3 rounded-2xl shadow border-b-4 border-pink-700 active:border-b-0 active:translate-y-1 transition-all">

            <button onclick="startGame(3)" class="flex flex-col items-center justify-center bg-yellow-400 hover:bg-yellow-500 text-purple-900 font-bold py-3 rounded-2xl shadow border-b-4 border-yellow-600 active:border-b-0 active:translate-y-1 transition-all">

            <button onclick="startGame(4)" class="flex flex-col items-center justify-center bg-green-400 hover:bg-green-500 text-purple-900 font-bold py-3 rounded-2xl shadow border-b-4 border-green-600 active:border-b-0 active:translate-y-1 transition-all">

            <button onclick="startGame(7)" class="flex flex-col items-center justify-center bg-orange-400 hover:bg-orange-500 text-white font-bold py-3 rounded-2xl shadow border-b-4 border-orange-600 active:border-b-0 active:translate-y-1 transition-all">

    </div>

    <!-- شاشة اللعب -->
    <div id="game-screen" class="hidden flex-1 flex flex-col h-full w-full">
        <!-- الشريط العلوي -->
        <div class="h-14 sm:h-16 bg-purple-600 text-white flex items-center justify-between px-3 shadow-md z-30 rounded-b-2xl shrink-0">
            <button onclick="showMenu()" class="text-xl sm:text-2xl bg-purple-800 w-10 h-10 rounded-full flex items-center justify-center shadow-inner active:scale-90 transition-transform">🔙</button>
            <div class="flex-1 flex justify-center items-center px-1 text-center">

            <div class="text-center flex-1">

        <!-- منطقة التحدي -->
        <div id="game-area" class="flex-1 relative w-full overflow-hidden flex flex-col min-h-0 bg-[#fce7f3]">

            <canvas id="maze-canvas" class="hidden"></canvas>

    <!-- نافذة الإجابة الصحيحة قبل الإعادة (شباك منفرد) -->

        <div class="bg-white rounded-3xl p-5 w-full max-w-sm text-center shadow-2xl pop border-8 border-green-400 flex flex-col gap-4 max-h-[90vh]">
            <h2 class="text-2xl sm:text-3xl font-black text-green-600">الإجابة الصح! 💡</h2>
            <p class="text-gray-600 font-bold text-sm sm:text-base">تعلميها يا بطلة قبل الإعادة</p>
            
            <div id="answer-details" class="flex-1 overflow-y-auto my-2 text-xl font-bold text-purple-800 bg-purple-50 p-4 rounded-xl border border-purple-200 flex flex-col justify-center gap-3">
                <!-- تفاصيل الإجابة -->
            </div>

            <button onclick="retryCurrentChallenge()" class="w-full bg-blue-500 hover:bg-blue-600 text-white text-lg sm:text-xl font-bold py-4 rounded-2xl shadow-lg border-b-4 border-blue-700 active:border-b-0 active:translate-y-1 transition-all flex items-center justify-center gap-2 shrink-0">
                <span>إعادة نفس السؤال</span> <span class="text-2xl">🔄</span>

        </div>
    </div>

    <!-- نافذة الفوز / الشهادة -->
    <div id="overlay" class="hidden fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-3xl p-6 w-full max-w-sm text-center shadow-2xl pop border-8 border-yellow-400 flex flex-col gap-5">
            <h2 id="overlay-title" class="text-2xl sm:text-3xl font-black text-purple-700">عنوان</h2>
            <p id="overlay-msg" class="text-lg font-bold text-gray-700">رسالة</p>
            <button onclick="shareImage()" class="w-full bg-pink-500 text-white text-lg font-bold py-4 rounded-xl shadow border-b-4 border-pink-700 active:border-b-0 active:translate-y-1 transition-all flex justify-center items-center gap-2">
                📸 احفظ الصورة (شهادة)
            </button>
            <button onclick="closeWinOverlay()" class="w-full bg-purple-600 text-white text-lg font-bold py-4 rounded-xl shadow border-b-4 border-purple-800 active:border-b-0 active:translate-y-1 transition-all">
                موافق
            </button>
        </div>
    </div>

    <!-- كانفاس مخفي للشهادة -->
    <canvas id="cert-canvas" width="800" height="1000" style="display:none;"></canvas>

    <script>
        // القاموس الشامل
        const fullDict = [
            {w:"بسة", e:"🐱"},{w:"كلب", e:"🐶"},{w:"عصفور", e:"🐦"},{w:"سمكة", e:"🐟"},
            {w:"أرنب", e:"🐰"},{w:"دب", e:"🐻"},{w:"حصان", e:"🐴"},{w:"دجاجة", e:"🐔"},
            {w:"فراشة", e:"🦋"},{w:"نحلة", e:"🐝"},{w:"شمس", e:"☀️"},{w:"قمر", e:"🌙"},
            {w:"نجمة", e:"⭐"},{w:"غيمة", e:"☁️"},{w:"مطر", e:"🌧️"},{w:"ثلج", e:"❄️"},
            {w:"نار", e:"🔥"},{w:"بحر", e:"🌊"},{w:"وردة", e:"🌹"},{w:"شجرة", e:"🌳"},
            {w:"تفاحة", e:"🍎"},{w:"موزة", e:"🍌"},{w:"برتقالة", e:"🍊"},{w:"عنب", e:"🍇"},
            {w:"بطيخة", e:"🍉"},{w:"تمر", e:"🌴"},{w:"خبز", e:"🍞"},{w:"حليب", e:"🥛"},
            {w:"كاسة", e:"🥤"},{w:"صحن", e:"🍽️"},{w:"ملعقة", e:"🥄"},{w:"شوكة", e:"🍴"},
            {w:"بيت", e:"🏠"},{w:"باب", e:"🚪"},{w:"شباك", e:"🪟"},{w:"سرير", e:"🛏️"},
            {w:"مخدة", e:"🛋️"},{w:"بطانية", e:"🛌"},{w:"كرسي", e:"🪑"},{w:"طاولة", e:"🪵"},
            {w:"مدرسة", e:"🏫"},{w:"كتاب", e:"📖"},{w:"قلم", e:"✏️"},{w:"دفتر", e:"📓"},
            {w:"شنطة", e:"🎒"},{w:"صورة", e:"🖼️"},{w:"ساعة", e:"⌚"},{w:"تلفون", e:"📱"},
            {w:"تلفزيون", e:"📺"},{w:"كاميرا", e:"📷"},{w:"سيارة", e:"🚗"},{w:"باص", e:"🚌"},
            {w:"طيارة", e:"✈️"},{w:"بسكليت", e:"🚲"},{w:"قطار", e:"🚂"},{w:"كورة", e:"⚽"},
            {w:"لعبة", e:"🧸"},{w:"دبدوب", e:"🧸"},{w:"فستان", e:"👗"},{w:"كندرة", e:"👞"},
            {w:"طاقية", e:"🧢"},{w:"جاكيت", e:"🧥"},{w:"بنطلون", e:"👖"},{w:"قميص", e:"👕"},
            {w:"جورب", e:"🧦"},{w:"فرشاية", e:"🪥"},{w:"مشط", e:"🪮"},{w:"صابونة", e:"🧼"},
            {w:"بشكير", e:"🧻"},{w:"مفتاح", e:"🔑"},{w:"هدية", e:"🎁"},{w:"بالون", e:"🎈"},
            {w:"كعكة", e:"🎂"},{w:"شمعة", e:"🕯️"},{w:"قلب", e:"❤️"},{w:"وجه", e:"🙂"},
            {w:"عين", e:"👁️"},{w:"إيد", e:"🖐️"},{w:"رجل", e:"🦶"},{w:"أصبع", e:"☝️"},
            {w:"ضحكة", e:"😄"},{w:"زعل", e:"😢"},{w:"نوم", e:"😴"},{w:"أكل", e:"🍲"},
            {w:"شرب", e:"🚰"},{w:"جري", e:"🏃"},{w:"قفز", e:"🦘"},{w:"غناء", e:"🎤"},
            {w:"رسم", e:"🎨"},{w:"إجاص", e:"🍐"},{w:"مانجا", e:"🥭"},{w:"أناناس", e:"🍍"},
            {w:"باربي", e:"👱‍♀️"},{w:"مكياج", e:"💄"},{w:"مرجيحة", e:"🛝"},{w:"حديقة", e:"🏞️"},
            {w:"رمل", e:"🏖️"},{w:"سمى", e:"🌌"},{w:"نجوم", e:"✨"},{w:"ضو", e:"💡"},
            {w:"عسل", e:"🍯"},{w:"جبنة", e:"🧀"},{w:"بيضة", e:"🥚"},{w:"خيار", e:"🥒"},
            {w:"ليمون", e:"🍋"},{w:"بريز", e:"🔌"},{w:"شاحن", e:"🔋"},{w:"محرمة", e:"🧻"},
            {w:"شنتة", e:"🎒"},{w:"ريشة", e:"🪶"},{w:"سطل", e:"🪣"},{w:"مجرفة", e:"⛏️"},
            {w:"راديو", e:"📻"},{w:"درج", e:"🪜"},{w:"سقف", e:"🏠"},{w:"حيط", e:"🧱"},
            {w:"مراية", e:"🪞"},{w:"حمامة", e:"🕊️"},{w:"غزال", e:"🦌"},{w:"فيل", e:"🐘"},
            {w:"زرافة", e:"🦒"},{w:"نملة", e:"🐜"},{w:"ذبابة", e:"🪰"},{w:"لولو", e:"🦪"},
            {w:"خرز", e:"📿"},{w:"عقد", e:"📿"}
        ];

        const colorsDict = [
            {w:"أحمر", e:"🔴"},{w:"أزرق", e:"🔵"},{w:"أخضر", e:"🟢"},{w:"أصفر", e:"🟡"},
            {w:"وردي", e:"🩷"},{w:"بنفسجي", e:"🟣"},{w:"برتقالي", e:"🟠"},{w:"أسود", e:"⚫"},
            {w:"أبيض", e:"⚪"},{w:"بني", e:"🟤"}
        ];

        let state = {
            challenge: 0, level: 1, stage: 1, lives: 3,
            stars: parseInt(localStorage.getItem('jawaher_stars') || '0'),
            usedWords: [], matchesToWin: 0, currentMatches: 0,
            ttsUnlocked: false, chData: null 
        };

        document.getElementById('stars-count').innerText = state.stars;

        function addStar() {
            state.stars++; localStorage.setItem('jawaher_stars', state.stars);
            document.getElementById('stars-count').innerText = state.stars;
            let el = document.getElementById('stars-count');
            el.classList.add('pop'); setTimeout(() => el.classList.remove('pop'), 400);
        }

        function initTTS() {
            if ('speechSynthesis' in window && !state.ttsUnlocked) {
                let msg = new SpeechSynthesisUtterance('');
                msg.volume = 0; window.speechSynthesis.speak(msg);
                state.ttsUnlocked = true;
            }
        }

        function speak(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                let msg = new SpeechSynthesisUtterance(text);
                msg.lang = 'ar-SA'; msg.rate = 0.85; 
                let voices = window.speechSynthesis.getVoices();
                let arVoice = voices.find(v => v.lang.startsWith('ar'));
                if (arVoice) msg.voice = arVoice;
                window.speechSynthesis.speak(msg);
            }
        }

        let canvas = document.getElementById('lines-canvas');
        let ctx = canvas.getContext('2d');
        let matchedPairs = [], isDrawing = false, startNode = null, currentTouch = {x: 0, y: 0};

        let mazeCanvas = document.getElementById('maze-canvas');
        let mCtx = mazeCanvas.getContext('2d');

        function resizeCanvas() {
            let area = document.getElementById('game-area');
            canvas.width = area.clientWidth; canvas.height = area.clientHeight;
            mazeCanvas.width = area.clientWidth; mazeCanvas.height = area.clientHeight;
            if(state.challenge === 8 && state.chData) drawMaze();
        }
        window.addEventListener('resize', resizeCanvas);

        // مسؤولة عن رسم الخطوط، وتم تعديلها لتقوم بالمسح الكامل دائماً لتفادي بقاء الشخابيط
        function drawLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height); 
            
            if (state.challenge >= 4 && state.challenge <= 8) {
                requestAnimationFrame(drawLoop);
                return;
            }

            ctx.lineCap = "round";
            let rect = document.getElementById('game-area').getBoundingClientRect();
            ctx.lineWidth = 6;
            
            matchedPairs.forEach(pair => {
                let r1 = pair.el1.getBoundingClientRect(), r2 = pair.el2.getBoundingClientRect();
                ctx.strokeStyle = "#a855f7"; ctx.beginPath();
                ctx.moveTo(r1.left + r1.width/2 - rect.left, r1.top + r1.height/2 - rect.top);
                ctx.lineTo(r2.left + r2.width/2 - rect.left, r2.top + r2.height/2 - rect.top);
                ctx.stroke();
            });

            if (isDrawing && startNode) {
                let r1 = startNode.getBoundingClientRect();
                ctx.strokeStyle = "#f472b6"; ctx.beginPath();
                ctx.moveTo(r1.left + r1.width/2 - rect.left, r1.top + r1.height/2 - rect.top);
                ctx.lineTo(currentTouch.x - rect.left, currentTouch.y - rect.top);
                ctx.stroke();
            }
            requestAnimationFrame(drawLoop);
        }
        drawLoop(); 

        function showMenu() {
            isDrawing = false; startNode = null; matchedPairs = [];
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            mCtx.clearRect(0, 0, mazeCanvas.width, mazeCanvas.height);
            document.getElementById('menu-screen').classList.remove('hidden');
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('answer-overlay').classList.add('hidden');
            mazeCanvas.classList.add('hidden');
            document.getElementById('game-content').classList.remove('pointer-events-none');
        }

        function startGame(ch) {
            initTTS(); speak('يلا نلعب يا جواهر'); 
            isDrawing = false; startNode = null; matchedPairs = []; state.chData = null;
            
            state.challenge = ch; state.level = 1; state.stage = 1; state.lives = 3; state.usedWords = [];
            
            document.getElementById('menu-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            
            // إخفاء القلوب في الذاكرة (عشان ما تخسر فجأة وهي تلعب)
            let livesCont = document.getElementById('lives-container');
            livesCont.style.opacity = (ch === 7) ? '0' : '1';
            
            if (ch === 8) {
                mazeCanvas.classList.remove('hidden');
                document.getElementById('game-content').classList.add('pointer-events-none');
            } else {
                mazeCanvas.classList.add('hidden');
                document.getElementById('game-content').classList.remove('pointer-events-none');
            }

            setTimeout(() => { resizeCanvas(); generateAndRenderChallenge(); }, 50);
        }

        function updateHeader() {
            let lvlTxt = `مستوى ${state.level}`;
            if(state.challenge >= 4 && state.challenge <= 6) lvlTxt = `مرحلة ${state.stage}`;
            if(state.challenge === 7) lvlTxt = `لعبة الذاكرة`; 
            if(state.challenge === 8) lvlTxt = `مستوى ${state.level}`; 
            document.getElementById('header-level').innerText = lvlTxt;
            
            const titles = ["", "مد الحرف", "اختيار اللون", "مد الرقم", "تحدي الجمع", "الحرف الناقص", "ترتيب الحروف", "لعبة الذاكرة", "المتاهة"];
            document.getElementById('header-title').innerText = titles[state.challenge];
            updateLivesDisplay();
        }

        function updateLivesDisplay() {
            if(state.challenge === 7) return;
            let hearts = '';
            for(let i=0; i<3; i++) hearts += i < state.lives ? '❤️' : '🖤';
            document.getElementById('lives-container').innerText = hearts;
        }

        function generateAndRenderChallenge() {
            matchedPairs = []; document.getElementById('game-content').innerHTML = ''; updateHeader();
            if (state.challenge === 1) genCh1(); else if (state.challenge === 2) genCh2();
            else if (state.challenge === 3) genCh3(); else if (state.challenge === 4) genCh4();
            else if (state.challenge === 5) genCh5(); else if (state.challenge === 6) genCh6();
            else if (state.challenge === 7) genCh7(); else if (state.challenge === 8) genCh8();
        }

        function retryCurrentChallenge() {

        // السحب للخطوط (أضيفت touchcancel للمزيد من الثبات)
        function bindDragEvents() {
            document.querySelectorAll('.draggable').forEach(el => {
                el.style.pointerEvents = 'auto'; 
                el.addEventListener('touchstart', onPointerDown, {passive: false});
                el.addEventListener('mousedown', onPointerDown, {passive: false});
            });
        }
        function onPointerDown(e) {
            if(state.challenge > 3) return;
            e.preventDefault(); if(e.target.classList.contains('matched')) return;
            startNode = e.target.closest('.draggable');
            if (startNode && startNode.dataset.val) speak(startNode.dataset.val);
            isDrawing = true; currentTouch = {x: e.touches ? e.touches[0].clientX : e.clientX, y: e.touches ? e.touches[0].clientY : e.clientY};
        }
        window.addEventListener('touchmove', (e) => { if (isDrawing && state.challenge <= 3) { e.preventDefault(); currentTouch = {x: e.touches[0].clientX, y: e.touches[0].clientY}; } }, {passive: false});
        window.addEventListener('mousemove', (e) => { if (isDrawing && state.challenge <= 3) currentTouch = {x: e.clientX, y: e.clientY}; });
        window.addEventListener('touchend', (e) => { if (isDrawing && state.challenge <= 3) handlePointerUp(e.changedTouches ? e.changedTouches[0].clientX : 0, e.changedTouches ? e.changedTouches[0].clientY : 0); });
        window.addEventListener('touchcancel', (e) => { if (isDrawing && state.challenge <= 3) { isDrawing = false; startNode = null; } });
        window.addEventListener('mouseup', (e) => { if (isDrawing && state.challenge <= 3) handlePointerUp(e.clientX, e.clientY); });
        function handlePointerUp(x, y) {
            if(!isDrawing) return;
            isDrawing = false; canvas.style.display = 'none'; let endNodeRaw = document.elementFromPoint(x, y); canvas.style.display = 'block';
            if (!endNodeRaw) { startNode = null; return; }
            let endNode = endNodeRaw.closest('.draggable');
            if (endNode && endNode !== startNode && !endNode.classList.contains('matched')) {
                if(startNode.dataset.type !== endNode.dataset.type && startNode.dataset.id === endNode.dataset.id) {
                    speak('شاطرة'); matchedPairs.push({el1: startNode, el2: endNode});
                    startNode.classList.add('matched', 'bg-green-200'); endNode.classList.add('matched', 'bg-green-200');
                    state.currentMatches++; if(state.currentMatches === state.matchesToWin) setTimeout(winLevel, 500);
                } else handleWrong();
            }
            startNode = null;
        }

        // ============================================

        function genCh1() {

            selected.forEach(w => state.usedWords.push(w.w));

            let right = selected.map(i => ({ id: i.w, content: i.e, val: i.w }));

                            </div>
                            <div class="absolute w-full h-full backface-hidden rotate-y-180 ${card.matched ? 'bg-green-200 border-green-500' : 'bg-white border-purple-300'} rounded-xl border-b-4 shadow-sm flex items-center justify-center">
                                <span class="text-4xl sm:text-5xl">${card.content}</span>
                            </div>
                        </div>
                    </div>
                `).join('')}
            </div>`;
        }
        function flipMemCard(idx) {
            let d = state.chData;
            if (d.isProcessing || d.cards[idx].flipped || d.cards[idx].matched) return;
            d.cards[idx].flipped = true; renderCh7UI();
            if (d.firstPick === null) d.firstPick = idx;
            else {
                d.isProcessing = true; let firstIdx = d.firstPick, secondIdx = idx;
                if (d.cards[firstIdx].matchId === d.cards[secondIdx].matchId) {
                    setTimeout(() => { speak('شاطرة'); d.cards[firstIdx].matched = true; d.cards[secondIdx].matched = true; d.firstPick = null; d.isProcessing = false; renderCh7UI();
                        if (d.cards.every(c => c.matched)) setTimeout(winLevel, 500);
                    }, 600);
                } else {
                    // كروت الذاكرة ترجع تنقلب بدون ما تخصم قلوب لضمان استمرارية اللعب
                    setTimeout(() => { d.cards[firstIdx].flipped = false; d.cards[secondIdx].flipped = false; d.firstPick = null; d.isProcessing = false; renderCh7UI(); }, 1200);
                }
            }
        }

        // ============================================
        // 8: المتاهة (HTML Canvas - خطوط سوداء 6px مترابطة)
        function genCh8() {
            let cols = state.level === 1 ? 4 : (state.level === 2 ? 5 : 6);
            let rows = state.level === 1 ? 5 : (state.level === 2 ? 7 : 8);
            
            let grid = [];
            for(let c=0; c<cols; c++) {
                grid[c] = [];
                for(let r=0; r<rows; r++) grid[c][r] = {c, r, visited: false, walls: {t:true, r:true, b:true, l:true}};
            }
            
            function dig(c, r) {
                grid[c][r].visited = true;
                let dirs = [{dc:0,dr:-1,w:'t',ow:'b'}, {dc:1,dr:0,w:'r',ow:'l'}, {dc:0,dr:1,w:'b',ow:'t'}, {dc:-1,dr:0,w:'l',ow:'r'}];
                shuffle(dirs);
                for(let dir of dirs) {
                    let nc = c + dir.dc, nr = r + dir.dr;
                    if(nc>=0 && nc<cols && nr>=0 && nr<rows && !grid[nc][nr].visited) {
                        grid[c][r].walls[dir.w] = false;
                        grid[nc][nr].walls[dir.ow] = false;
                        dig(nc, nr);
                    }
                }
            }
            dig(0, 0);

            // حساب المسار الصحيح ووضع الأهداف الخاطئة خارجه لضمان عدم إغلاق الطريق
            let queue = [{c: 0, r: 0, path: ["0,0"]}];
            let visitedBFS = Array.from({length: cols}, () => Array(rows).fill(false));
            visitedBFS[0][0] = true;
            let furthestCell = {c: 0, r: 0};
            let maxDist = 0;
            let paths = {};

            while(queue.length > 0) {
                let curr = queue.shift();
                paths[curr.c + ',' + curr.r] = curr.path;

                if(curr.path.length > maxDist) {
                    maxDist = curr.path.length;
                    furthestCell = {c: curr.c, r: curr.r};
                }

                let cell = grid[curr.c][curr.r];
                let neighbors = [];
                if(!cell.walls.t) neighbors.push({c: curr.c, r: curr.r-1});
                if(!cell.walls.r) neighbors.push({c: curr.c+1, r: curr.r});
                if(!cell.walls.b) neighbors.push({c: curr.c, r: curr.r+1});
                if(!cell.walls.l) neighbors.push({c: curr.c-1, r: curr.r});

                for(let n of neighbors) {
                    if(!visitedBFS[n.c][n.r]) {
                        visitedBFS[n.c][n.r] = true;
                        queue.push({c: n.c, r: n.r, path: [...curr.path, n.c + ',' + n.r]});
                    }
                }
            }

            let correctPathSet = new Set(paths[furthestCell.c + ',' + furthestCell.r]);
            
            let possibleWrong = [];
            for(let c=0; c<cols; c++) {
                for(let r=0; r<rows; r++) {
                    let key = c + ',' + r;
                    if(!correctPathSet.has(key)) {
                        possibleWrong.push({c, r});
                    }
                }
            }
            shuffle(possibleWrong);

            let startCell = {c: 0, r: 0};
            let correctEnd = furthestCell;
            let wrong1End = possibleWrong[0] || {c: cols-1, r: 0};
            let wrong2End = possibleWrong[1] || {c: 0, r: rows-1};

            let mode = Math.floor(Math.random() * 4);
            let startTarget, correctTarget, w1, w2;
            
            if(mode === 0 || mode === 1) {
                let avail = [...fullDict]; shuffle(avail);
                correctTarget = { e: avail[0].e, text: avail[0].w };
                startTarget = { e: mode===0 ? avail[0].w : avail[0].e };
                w1 = { e: avail[1].e }; w2 = { e: avail[2].e };
            } else if(mode === 2) {
                let n = Math.floor(Math.random()*6)+1;
                let e = fullDict[Math.floor(Math.random()*fullDict.length)].e;
                startTarget = { e: n.toString() };
                correctTarget = { e: Array(n).fill(e).join(''), text: 'العدد الصحيح' };
                w1 = { e: Array(n+1).fill(e).join('') };
                w2 = { e: Array(Math.max(1, n-1)).fill(e).join('') };
            } else {
                let avail = [...colorsDict]; shuffle(avail);
                startTarget = { e: avail[0].e }; 
                correctTarget = { e: avail[0].w, text: avail[0].w }; 
                w1 = { e: avail[1].w }; w2 = { e: avail[2].w };
            }

            state.chData = {
                cols, rows, grid, mode,
                startTarget, correctTarget, w1, w2,
                startCell,
                correctEnd: correctEnd, wrong1End: wrong1End, wrong2End: wrong2End,
                userPath: [startCell], isDrawing: false
            };
            drawMaze();
        }

        function drawMaze() {
            if(!state.chData || state.challenge !== 8) return;
            let d = state.chData;
            mCtx.clearRect(0, 0, mazeCanvas.width, mazeCanvas.height);
            
            // إضافة Margin داخلي بسيط للمتاهة
            let padding = 10;
            let usableW = mazeCanvas.width - (padding*2);
            let usableH = mazeCanvas.height - (padding*2) - 80; // رفعها عن القاع شوي
            
            // جعل المتاهة في المنتصف
            let cw = usableW / d.cols;
            let ch = usableH / d.rows;
            let offsetX = padding;
            let offsetY = padding + 40;

            // رسم مسار اللاعب (أصفر شفاف)
            if(d.userPath.length > 0) {
                mCtx.beginPath();
                mCtx.strokeStyle = 'rgba(253, 224, 71, 0.7)'; 
                mCtx.lineWidth = Math.min(cw, ch) * 0.6;
                mCtx.lineCap = 'round';
                mCtx.lineJoin = 'round';
                
                let first = d.userPath[0];
                mCtx.moveTo(offsetX + first.c * cw + cw/2, offsetY + first.r * ch + ch/2);
                for(let i=1; i<d.userPath.length; i++) {
                    let p = d.userPath[i];
                    mCtx.lineTo(offsetX + p.c * cw + cw/2, offsetY + p.r * ch + ch/2);
                }
                
                if(d.isDrawing && currentTouch.x !== 0) {
                    let rect = mazeCanvas.getBoundingClientRect();
                    mCtx.lineTo(currentTouch.x - rect.left, currentTouch.y - rect.top);
                }
                mCtx.stroke();
            }

            // رسم الجدران بخطوط سوداء 6px
            mCtx.beginPath();
            mCtx.strokeStyle = '#000000';
            mCtx.lineWidth = 6;
            mCtx.lineCap = 'round';
            for(let c=0; c<d.cols; c++) {
                for(let r=0; r<d.rows; r++) {
                    let cell = d.grid[c][r];
                    let x = offsetX + c * cw; let y = offsetY + r * ch;
                    if(cell.walls.t) { mCtx.moveTo(x, y); mCtx.lineTo(x+cw, y); }
                    if(cell.walls.r) { mCtx.moveTo(x+cw, y); mCtx.lineTo(x+cw, y+ch); }
                    if(cell.walls.b) { mCtx.moveTo(x, y+ch); mCtx.lineTo(x+cw, y+ch); }
                    if(cell.walls.l) { mCtx.moveTo(x, y); mCtx.lineTo(x, y+ch); }
                }
            }
            mCtx.stroke();

            // رسم الأهداف
            mCtx.textAlign = 'center'; mCtx.textBaseline = 'middle';
            let fontSize = Math.min(cw, ch) * 0.45;
            mCtx.font = `bold ${fontSize}px Cairo`;
            
            function drawCellContent(cell, text, bg) {
                let x = offsetX + cell.c * cw + cw/2; let y = offsetY + cell.r * ch + ch/2;
                mCtx.fillStyle = bg; mCtx.beginPath(); mCtx.arc(x, y, fontSize*1.1, 0, Math.PI*2); mCtx.fill();
                mCtx.fillStyle = '#000'; mCtx.fillText(text, x, y);
            }

            drawCellContent(d.startCell, d.startTarget.e, '#bbf7d0'); 
            drawCellContent(d.correctEnd, d.correctTarget.e, '#fef08a'); 
            drawCellContent(d.wrong1End, d.w1.e, '#fecaca'); 
            drawCellContent(d.wrong2End, d.w2.e, '#fecaca'); 
        }

        mazeCanvas.addEventListener('touchstart', mazeDown, {passive:false});
        mazeCanvas.addEventListener('touchmove', mazeMove, {passive:false});
        mazeCanvas.addEventListener('touchend', mazeUp);
        mazeCanvas.addEventListener('touchcancel', mazeUp);
        mazeCanvas.addEventListener('mousedown', mazeDown);
        mazeCanvas.addEventListener('mousemove', mazeMove);
        mazeCanvas.addEventListener('mouseup', mazeUp);

        function mazeDown(e) {
            if(state.challenge !== 8 || state.isShowingAnswer) return;
            e.preventDefault();
            let rect = mazeCanvas.getBoundingClientRect();
            let x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
            let y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
            
            let d = state.chData;
            let padding = 10; let usableW = mazeCanvas.width - (padding*2); let usableH = mazeCanvas.height - (padding*2) - 80;
            let cw = usableW / d.cols; let ch = usableH / d.rows;
            let offsetX = padding; let offsetY = padding + 40;
            
            let c = Math.floor((x - offsetX) / cw); let r = Math.floor((y - offsetY) / ch);
            
            if(c === d.startCell.c && r === d.startCell.r) {
                d.isDrawing = true; d.userPath = [d.startCell]; currentTouch = {x: e.clientX||e.touches[0].clientX, y: e.clientY||e.touches[0].clientY};
                drawMaze();
            }
        }

        function mazeMove(e) {
            if(!state.chData || !state.chData.isDrawing || state.challenge !== 8) return;
            e.preventDefault();
            let rect = mazeCanvas.getBoundingClientRect();
            currentTouch = {x: e.touches ? e.touches[0].clientX : e.clientX, y: e.touches ? e.touches[0].clientY : e.clientY};
            let x = currentTouch.x - rect.left; let y = currentTouch.y - rect.top;
            
            let d = state.chData;
            let padding = 10; let usableW = mazeCanvas.width - (padding*2); let usableH = mazeCanvas.height - (padding*2) - 80;
            let cw = usableW / d.cols; let ch = usableH / d.rows;
            let offsetX = padding; let offsetY = padding + 40;
            
            let c = Math.floor((x - offsetX) / cw); let r = Math.floor((y - offsetY) / ch);
            
            if(c>=0 && c<d.cols && r>=0 && r<d.rows) {
                let last = d.userPath[d.userPath.length-1];
                if(c !== last.c || r !== last.r) {
                    let isAdj = (Math.abs(c - last.c) + Math.abs(r - last.r)) === 1;
                    if(isAdj) {
                        let cell = d.grid[last.c][last.r];
                        let hitWall = false;
                        if(c > last.c && cell.walls.r) hitWall = true;
                        if(c < last.c && cell.walls.l) hitWall = true;
                        if(r > last.r && cell.walls.b) hitWall = true;
                        if(r < last.r && cell.walls.t) hitWall = true;
                        
                        if(!hitWall) {
                            d.userPath.push({c, r});
                            if(c === d.correctEnd.c && r === d.correctEnd.r) {
                                d.isDrawing = false; drawMaze(); setTimeout(winLevel, 300);
                            } else if ((c===d.wrong1End.c && r===d.wrong1End.r) || (c===d.wrong2End.c && r===d.wrong2End.r)) {
                                d.isDrawing = false; d.userPath=[]; drawMaze(); handleWrong();
                            }
                        } else {
                            d.isDrawing = false; d.userPath=[]; drawMaze(); handleWrong();
                        }
                    }
                }
            }
            drawMaze();
        }

        function mazeUp(e) {
            if(state.chData && state.chData.isDrawing) { state.chData.isDrawing = false; drawMaze(); }
        }

    </script>
